<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>職場生存工具 Office Survival</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <!-- 啟動畫面 -->
    <div id="splash" class="splash-screen">
        <div class="splash-content">
            <div class="splash-icon">🛡️</div>
            <h1>職場生存工具</h1>
            <p>Office Survival Kit</p>
            <div class="splash-loader">
                <div class="loader-bar"></div>
            </div>
            <p class="splash-hint">正在建立防護結界...</p>
        </div>
    </div>

    <!-- 主容器 -->
    <div id="app" class="app-container hidden">
        <!-- 頂部標題欄 -->
        <header class="app-header">
            <div class="header-title">
                <span id="header-icon">🛡️</span>
                <span id="header-text">職場生存工具</span>
            </div>
            <div class="header-actions">
                <button id="btn-boundary-toggle" class="icon-btn" title="下班結界">
                    <span id="boundary-indicator">🔓</span>
                </button>
            </div>
        </header>

        <!-- 頁面內容區 -->
        <main class="app-main" id="main-content">
            <!-- 各頁面由 JS 動態載入 -->
        </main>

        <!-- 底部導航 -->
        <nav class="app-nav">
            <button class="nav-item active" data-page="shield">
                <span class="nav-icon">🛡️</span>
                <span class="nav-label">防護罩</span>
            </button>
            <button class="nav-item" data-page="bingo">
                <span class="nav-icon">🎯</span>
                <span class="nav-label">Bingo</span>
            </button>
            <button class="nav-item" data-page="chat">
                <span class="nav-icon">💬</span>
                <span class="nav-label">偽裝聊</span>
            </button>
            <button class="nav-item" data-page="disguise">
                <span class="nav-icon">🎭</span>
                <span class="nav-label">變臉</span>
            </button>
            <button class="nav-item" data-page="notify">
                <span class="nav-icon">🔔</span>
                <span class="nav-label">假通知</span>
            </button>
            <button class="nav-item" data-page="settings">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">設定</span>
            </button>
        </nav>
    </div>

    <!-- 下班結界覆蓋層 -->
    <div id="boundary-overlay" class="boundary-overlay hidden">
        <div class="boundary-content">
            <div class="boundary-icon">🚧</div>
            <h2>⛔ 下班結界已啟動</h2>
            <p>現在是非工作時間</p>
            <p class="boundary-time" id="boundary-time"></p>
            <div class="boundary-cost">
                <p>要解除結界查看工作訊息？</p>
                <button id="btn-pay-boundary" class="btn-primary">
                    💰 支付 50 元解除
                </button>
            </div>
            <button id="btn-close-boundary" class="btn-text">返回</button>
        </div>
    </div>

    <!-- 假通知預覽 -->
    <div id="fake-notification" class="fake-notification hidden">
        <div class="fake-notify-icon">⚙️</div>
        <div class="fake-notify-content">
            <div class="fake-notify-title">系統備份完成</div>
            <div class="fake-notify-body">每日自動備份已成功執行</div>
        </div>
        <div class="fake-notify-time">剛剛</div>
    </div>

    <!-- 腳本 -->
    <script src="js/llm.js"></script>
    <script src="js/friends.js"></script>
    <script src="js/groups.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/app.js"></script>
    <script src="js/shield.js"></script>
    <script src="js/bingo.js"></script>
    <script src="js/boundary.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/disguise.js"></script>
    <script src="js/fake-notify.js"></script>
</body>
</html>
